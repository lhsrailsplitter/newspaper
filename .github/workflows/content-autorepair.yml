name: Content Auto-Repair

on:
  push:
    paths:
      - content.json

# Write permission needed to commit the repaired file back.
permissions:
  contents: write

jobs:
  autorepair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the actual branch so we can push back to it.
          ref: ${{ github.ref }}

      - name: Run integrity check
        id: check
        run: python3 .github/scripts/check_content.py content.json
        # Don't abort the job on failure — we want to attempt repair.
        continue-on-error: true

      - name: Install ftfy
        if: steps.check.outcome == 'failure'
        run: pip install ftfy

      - name: Repair content.json
        if: steps.check.outcome == 'failure'
        run: python3 .github/scripts/repair_content.py content.json

      - name: Verify repair fixed the corruption
        if: steps.check.outcome == 'failure'
        run: python3 .github/scripts/check_content.py content.json

      - name: Commit repaired file
        if: steps.check.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content.json
          # Only commit if the file actually changed.
          if git diff --staged --quiet; then
            echo "No changes to commit after repair."
          else
            git commit -m "fix: auto-repair encoding corruption in content.json"
            git push
          fi
