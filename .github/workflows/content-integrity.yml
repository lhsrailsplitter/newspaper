name: Content Integrity Check

on:
  push:
    paths:
      - content.json
  pull_request:
    paths:
      - content.json

jobs:
  check-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check content.json for corruption
        run: python3 .github/scripts/check_content.py content.json
