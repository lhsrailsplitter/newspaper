name: Content Schema Validation

on:
  push:
    paths:
      - content.json
  pull_request:
    paths:
      - content.json

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate content.json structure
        run: python3 .github/scripts/validate_content.py content.json
